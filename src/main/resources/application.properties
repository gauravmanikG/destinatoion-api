# ==========================================
#  Application Configuration
# ==========================================
spring.application.name=destination-api
server.port=${PORT:8080}

# ==========================================
#  Database Configuration
# ==========================================
# Default: H2 in-memory (for local development)
# Override with DATABASE_URL env var for PostgreSQL (Render deployment)

spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:destinationdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# H2 Console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
#  Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
